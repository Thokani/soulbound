<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOULBOUND</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; font-family:monospace; overflow:hidden; }
#menu {
  position:fixed; inset:0; background:#0a0a0a;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999;
}
#menu h1 { font-size:52px; color:#aaaaff; letter-spacing:6px; text-shadow:0 0 30px #4444aa; margin-bottom:10px; }
#menu .sub { color:#555577; font-size:15px; margin-bottom:6px; }
#menu .ctrl { color:#666688; font-size:13px; margin:5px 0; }
#menu .stats { color:#444466; font-size:13px; margin:20px 0 30px; }
#play-btn {
  background:#2244aa; color:#fff; border:2px solid #4466dd;
  border-radius:8px; font-size:22px; font-family:monospace; font-weight:bold;
  padding:14px 50px; cursor:pointer; letter-spacing:3px;
}
#play-btn:hover { background:#4466dd; }
</style>
</head>
<body>

<div id="game-wrap" style="position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;"></div>
<div id="menu">
  <h1>SOULBOUND</h1>
  <p class="sub">Absorb enemy souls. Build your party. Survive.</p>
  <p class="ctrl">WASD — Move &nbsp;|&nbsp; SPACE — Attack &nbsp;|&nbsp; SHIFT — Dodge roll</p>
  <p class="ctrl">Kill enemies → absorb soul orbs → gain companions</p>
  <p class="ctrl">Clear the room → walk to the TOP DOOR → pick a boon</p>
  <p class="stats" id="stats-txt"></p>
  <button id="play-btn">▶ &nbsp;PLAY</button>
</div>

<script>
// ─── STATS ───────────────────────────────────────────────────
const runs = parseInt(localStorage.getItem('sb_runs') || '0');
const best = parseInt(localStorage.getItem('sb_best') || '0');
if (runs > 0) document.getElementById('stats-txt').textContent =
  `Runs: ${runs}   Best Room: ${best}`;

// ─── CONSTANTS ───────────────────────────────────────────────
const W = 900, H = 600, WALL = 50;

const BOON_LIST = [
  { id:'iron',     name:'Iron Skin',     desc:'+20 Max HP',           apply:p=>{ p.maxHp+=20; p.hp=Math.min(p.hp+20,p.maxHp); } },
  { id:'swift',    name:'Swift Strikes', desc:'Attack -0.1s cooldown',apply:p=>{ p.atkCd=Math.max(0.15,p.atkCd-0.1); } },
  { id:'life',     name:'Lifesteal',     desc:'Heal 5 HP per kill',   apply:p=>{ p.lifesteal+=5; } },
  { id:'berserk',  name:'Berserker',     desc:'+25% dmg below 50% HP',apply:p=>{ p.berserker=true; } },
  { id:'slink',    name:'Soul Link',     desc:'+5% dmg per companion',apply:p=>{ p.soulLink=true; } },
  { id:'tough',    name:'Toughness',     desc:'10% less damage taken', apply:p=>{ p.dmgRes=Math.min(0.5,(p.dmgRes||0)+0.1); } },
  { id:'speed',    name:'Momentum',      desc:'+15% move speed',      apply:p=>{ p.spd=Math.min(320,p.spd*1.15); } },
];

const SOUL_DEF = {
  bone:   { name:'Bone Shield', desc:'10% less damage',  col:0xccccaa },
  shadow: { name:'Shadow Step', desc:'Dodge cd -30%',    col:0x9944ee },
  fury:   { name:'Fury',        desc:'+15% atk damage',  col:0xff4422 },
};

const ENEMY_DEF = [
  { type:'skel',  name:'Skeleton',   col:0xccccaa, hp:40, spd:70,  dmg:12, soul:'bone',   ranged:false, charge:false },
  { type:'wisp',  name:'Wisp',       col:0x9944ee, hp:25, spd:140, dmg:8,  soul:'shadow', ranged:true,  charge:false },
  { type:'demon', name:'Rage Demon', col:0xff4422, hp:60, spd:55,  dmg:18, soul:'fury',   ranged:false, charge:true  },
];

// ─── GAME SCENE ──────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super({ key:'Game' }); }

  create() {
    this.souls   = [];
    this.boons   = [];
    this.enemies = [];
    this.projs   = [];
    this.orbs    = [];
    this.room    = 0;

    // player state
    const p = this.p = {
      x:W/2, y:H/2+60,
      hp:100, maxHp:100, spd:220,
      atkCd:0.5, atkT:0,
      dodgeCd:1.2, dodgeT:0,
      dodging:false, dodgeDur:0, dvx:0, dvy:0,
      fx:1, fy:0,
      lifesteal:0, berserker:false, soulLink:false, dmgRes:0,
      dead:false,
    };

    // graphics layers
    this.gRoom   = this.add.graphics().setDepth(0);
    this.gDoor   = this.add.graphics().setDepth(1);
    this.gOrbs   = this.add.graphics().setDepth(3);
    this.gAtk    = this.add.graphics().setDepth(4).setAlpha(0);
    this.gPlayer = this.add.graphics().setDepth(5);

    // UI
    this.uiHpBg  = this.add.graphics().setDepth(10);
    this.uiHpFg  = this.add.graphics().setDepth(10);
    this.uiHpTxt = this.add.text(16,14,'',{fontSize:'13px',fill:'#fff',fontFamily:'monospace'}).setDepth(11);
    this.uiRoom  = this.add.text(W-12,14,'',{fontSize:'15px',fill:'#aaaaff',fontFamily:'monospace'}).setOrigin(1,0).setDepth(11);

    // companion slots
    this.uiSlots = [];
    for(let i=0;i<4;i++){
      const sx=12+i*222;
      this.uiSlots.push({
        bg:  this.add.graphics().setDepth(10),
        nm:  this.add.text(sx+36,H-49,'',{fontSize:'11px',fill:'#fff',fontFamily:'monospace'}).setDepth(11),
        ds:  this.add.text(sx+36,H-33,'',{fontSize:'10px',fill:'#aaa',fontFamily:'monospace'}).setDepth(11),
        ico: this.add.graphics().setDepth(11),
        sx,
      });
    }

    this.keys = this.input.keyboard.addKeys({
      up:Phaser.Input.Keyboard.KeyCodes.W,
      dn:Phaser.Input.Keyboard.KeyCodes.S,
      lt:Phaser.Input.Keyboard.KeyCodes.A,
      rt:Phaser.Input.Keyboard.KeyCodes.D,
      atk:Phaser.Input.Keyboard.KeyCodes.SPACE,
      dodge:Phaser.Input.Keyboard.KeyCodes.SHIFT,
    });

    this.nextRoom();
  }

  // ── ROOM SETUP ──────────────────────────────────────────────
  nextRoom() {
    this.room++;
    this.cleared = false;
    this.boonUp  = false;
    this.doorOpen = false;

    // reset enemies/projs/orbs
    this.enemies.forEach(e=>{ e.g?.destroy(); e.hb?.destroy(); });
    this.enemies = [];
    this.projs.forEach(p=>p.g?.destroy());
    this.projs = [];
    this.orbs.forEach(o=>o.g?.destroy());
    this.orbs = [];

    // draw room
    const g = this.gRoom;
    g.clear();
    g.fillStyle(0x1a1a2e); g.fillRect(WALL,WALL,W-WALL*2,H-WALL*2);
    g.fillStyle(0x2d2d4a);
    g.fillRect(0,0,W,WALL); g.fillRect(0,H-WALL,W,WALL);
    g.fillRect(0,0,WALL,H); g.fillRect(W-WALL,0,WALL,H);
    g.lineStyle(1,0x33336a,0.4);
    for(let x=WALL;x<W-WALL;x+=60){ g.lineBetween(x,WALL,x,H-WALL); }
    for(let y=WALL;y<H-WALL;y+=60){ g.lineBetween(WALL,y,W-WALL,y); }

    this.drawDoor(false);

    // spawn enemies
    const boss = this.room%5===0;
    const cnt  = boss?1:Phaser.Math.Between(3,5+Math.floor(this.room/2));
    for(let i=0;i<cnt;i++){
      let def = boss
        ? {...ENEMY_DEF[2], name:'BOSS', col:0xff0000, hp:200, spd:110, dmg:25}
        : ENEMY_DEF[Phaser.Math.Between(0,ENEMY_DEF.length-1)];
      this.spawnEnemy(def);
    }

    // reset player pos
    this.p.x=W/2; this.p.y=H/2+60;
    this.uiRoom.setText(`Room ${this.room}`);
  }

  drawDoor(open){
    const d=this.gDoor; d.clear();
    const dx=W/2;
    if(open){
      d.fillStyle(0x00ff88); d.fillRect(dx-28,2,56,WALL-2);
      d.fillStyle(0x00ffaa); d.fillTriangle(dx,WALL-8,dx-16,WALL+12,dx+16,WALL+12);
    } else {
      d.fillStyle(0x443333); d.fillRect(dx-28,2,56,WALL-2);
    }
  }

  spawnEnemy(def){
    let ex,ey,att=0;
    do{
      ex=Phaser.Math.Between(WALL+50,W-WALL-50);
      ey=Phaser.Math.Between(WALL+50,H-WALL-80);
      att++;
    }while(Phaser.Math.Distance.Between(ex,ey,this.p.x,this.p.y)<160&&att<20);

    const e = { ...def, x:ex, y:ey, maxHp:def.hp,
      aiT:Math.random(), projT:0, chargeT:0, charging:false, cvx:0, cvy:0, dead:false,
      g:this.add.graphics().setDepth(2), hb:this.add.graphics().setDepth(3) };
    this.drawEnemy(e);
    this.enemies.push(e);
  }

  drawEnemy(e){
    e.g.clear(); e.g.setPosition(e.x,e.y);
    if(e.dead) return;
    e.g.fillStyle(e.col);
    if(e.type==='wisp'){
      e.g.fillCircle(0,0,11);
      e.g.lineStyle(1,0xffffff,0.25); e.g.strokeCircle(0,0,16);
    } else if(e.type==='skel'){
      e.g.fillRect(-10,-13,20,26);
    } else {
      e.g.fillTriangle(0,-15,-13,13,13,13);
    }
    // hp bar
    e.hb.clear();
    e.hb.fillStyle(0x330000); e.hb.fillRect(e.x-16,e.y-24,32,4);
    const pct=Math.max(0,e.hp/e.maxHp);
    e.hb.fillStyle(0xff3333); e.hb.fillRect(e.x-16,e.y-24,Math.round(32*pct),4);
  }

  drawPlayer(){
    const p=this.p, g=this.gPlayer;
    g.clear(); g.setPosition(p.x,p.y);
    g.fillStyle(p.dodging?0x6688ff:0x4488ff);
    g.fillCircle(0,0,14);
    g.fillStyle(0xffffff); g.fillCircle(p.fx*7,p.fy*7,4);
    g.fillStyle(0x0000cc); g.fillCircle(p.fx*8,p.fy*8,2);
  }

  // ── UPDATE ──────────────────────────────────────────────────
  update(_t, delta){
    if(this.p.dead || this.boonUp) return;
    const dt = delta/1000;
    this.movePlayer(dt);
    this.doAttack(dt);
    this.moveEnemies(dt);
    this.moveProjs(dt);
    this.checkOrbs();
    this.checkClear();
    this.drawPlayer();
    this.redrawUI();
  }

  playerDmg(){
    let d=20;
    if(this.souls.find(s=>s&&s.id==='fury')) d*=1.15;
    if(this.p.berserker && this.p.hp<this.p.maxHp*0.5) d*=1.25;
    if(this.p.soulLink) d*=1+this.souls.filter(s=>s).length*0.05;
    return Math.floor(d);
  }

  // ── MOVEMENT ────────────────────────────────────────────────
  movePlayer(dt){
    const p=this.p, k=this.keys;
    if(p.dodging){
      p.dodgeDur-=dt;
      if(p.dodgeDur<=0) p.dodging=false;
      p.x=Phaser.Math.Clamp(p.x+p.dvx*dt,WALL+16,W-WALL-16);
      p.y=Phaser.Math.Clamp(p.y+p.dvy*dt,WALL+16,H-WALL-80);
      return;
    }
    let vx=0,vy=0;
    if(k.lt.isDown) vx-=1;
    if(k.rt.isDown) vx+=1;
    if(k.up.isDown) vy-=1;
    if(k.dn.isDown) vy+=1;
    if(vx||vy){ const l=Math.sqrt(vx*vx+vy*vy); vx/=l; vy/=l; p.fx=vx; p.fy=vy; }
    p.x=Phaser.Math.Clamp(p.x+vx*p.spd*dt,WALL+16,W-WALL-16);
    p.y=Phaser.Math.Clamp(p.y+vy*p.spd*dt,WALL+16,H-WALL-80);

    p.dodgeT=Math.max(0,p.dodgeT-dt);
    if(Phaser.Input.Keyboard.JustDown(k.dodge)&&p.dodgeT<=0){
      const ddx=vx||p.fx, ddy=vy||p.fy;
      const l=Math.sqrt(ddx*ddx+ddy*ddy)||1;
      p.dvx=(ddx/l)*500; p.dvy=(ddy/l)*500;
      p.dodging=true; p.dodgeDur=0.22;
      let cd=p.dodgeCd;
      if(this.souls.find(s=>s&&s.id==='shadow')) cd*=0.7;
      p.dodgeT=cd;
    }
  }

  // ── ATTACK ──────────────────────────────────────────────────
  doAttack(dt){
    const p=this.p;
    p.atkT=Math.max(0,p.atkT-dt);
    if(!Phaser.Input.Keyboard.JustDown(this.keys.atk)||p.atkT>0) return;
    p.atkT=p.atkCd;
    const dmg=this.playerDmg(), range=68;

    this.gAtk.clear().setAlpha(0.6).setPosition(p.x+p.fx*36,p.y+p.fy*36);
    this.gAtk.fillStyle(0xffffff); this.gAtk.fillCircle(0,0,28);
    this.tweens.add({targets:this.gAtk,alpha:0,duration:180});

    this.enemies.forEach(e=>{
      if(e.dead) return;
      const dx=e.x-p.x, dy=e.y-p.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>range) return;
      const dot=(dx/dist)*p.fx+(dy/dist)*p.fy;
      if(dot<0.2) return;
      e.hp-=dmg;
      this.floatNum(e.x,e.y-10,dmg,0xffffff);
      if(e.hp<=0){ e.dead=true; p.hp=Math.min(p.maxHp,p.hp+p.lifesteal); this.killEnemy(e); }
      else this.tweens.add({targets:e.g,alpha:0.2,yoyo:true,duration:80});
    });
  }

  killEnemy(e){
    e.g.destroy(); e.hb.destroy();
    if(Math.random()<0.4){
      const sd=SOUL_DEF[e.soul];
      const orb={id:e.soul,name:sd.name,desc:sd.desc,col:sd.col,x:e.x,y:e.y,t:0,
        g:this.add.graphics().setDepth(3)};
      this.orbs.push(orb);
    }
  }

  // ── ENEMY AI ────────────────────────────────────────────────
  moveEnemies(dt){
    const p=this.p;
    this.enemies.forEach(e=>{
      if(e.dead) return;
      e.aiT-=dt;
      const dx=p.x-e.x, dy=p.y-e.y, dist=Math.sqrt(dx*dx+dy*dy);
      const nx=dx/dist, ny=dy/dist;

      if(e.ranged){
        e.projT-=dt;
        const target = dist>200 ? 1 : (dist<120 ? -1 : 0);
        e.x+=nx*target*e.spd*dt; e.y+=ny*target*e.spd*dt;
        if(e.projT<=0){ e.projT=1.8; this.spawnProj(e.x,e.y,nx,ny,e.dmg); }
      } else if(e.charge){
        if(!e.charging){
          e.x+=nx*e.spd*dt; e.y+=ny*e.spd*dt;
          if(e.aiT<=0&&dist<180){
            e.aiT=2.5; e.charging=true; e.chargeT=0.5;
            e.cvx=nx*350; e.cvy=ny*350;
          }
        } else {
          e.chargeT-=dt; e.x+=e.cvx*dt; e.y+=e.cvy*dt;
          if(e.chargeT<=0) e.charging=false;
          if(Math.sqrt((e.x-p.x)**2+(e.y-p.y)**2)<22&&!p.dodging) this.hurtPlayer(e.dmg);
        }
      } else {
        e.x+=nx*e.spd*dt; e.y+=ny*e.spd*dt;
        if(dist<28&&e.aiT<=0){ e.aiT=1.2; if(!p.dodging) this.hurtPlayer(e.dmg); }
      }

      e.x=Phaser.Math.Clamp(e.x,WALL+15,W-WALL-15);
      e.y=Phaser.Math.Clamp(e.y,WALL+15,H-WALL-80);
      this.drawEnemy(e);
    });
  }

  spawnProj(x,y,vx,vy,dmg){
    const g=this.add.graphics().setDepth(3);
    g.fillStyle(0xcc44ff); g.fillCircle(0,0,6);
    this.projs.push({x,y,vx:vx*200,vy:vy*200,dmg,life:2.5,g});
  }

  moveProjs(dt){
    const p=this.p;
    this.projs=this.projs.filter(pr=>{
      if(pr.dead){pr.g.destroy();return false;}
      pr.x+=pr.vx*dt; pr.y+=pr.vy*dt; pr.life-=dt;
      pr.g.setPosition(pr.x,pr.y);
      if(pr.x<WALL||pr.x>W-WALL||pr.y<WALL||pr.y>H-WALL||pr.life<=0){pr.g.destroy();return false;}
      if(!p.dodging&&Phaser.Math.Distance.Between(pr.x,pr.y,p.x,p.y)<18){
        this.hurtPlayer(pr.dmg); pr.g.destroy(); return false;
      }
      return true;
    });
  }

  // ── SOUL ORBS ───────────────────────────────────────────────
  checkOrbs(){
    const p=this.p;
    this.gOrbs.clear();
    this.orbs=this.orbs.filter(o=>{
      if(o.absorbed) return false;
      o.t+=0.05;
      const pulse=Math.sin(o.t*3)*0.15;
      this.gOrbs.fillStyle(o.col,0.85+pulse);
      this.gOrbs.fillCircle(o.x,o.y,10);
      this.gOrbs.lineStyle(2,0xffffff,0.3);
      this.gOrbs.strokeCircle(o.x,o.y,15+Math.sin(o.t*2)*2);

      if(Phaser.Math.Distance.Between(o.x,o.y,p.x,p.y)<22){
        o.absorbed=true;
        this.absorbSoul(o);
        return false;
      }
      return true;
    });
  }

  absorbSoul(o){
    const soul={id:o.id,name:o.name,desc:o.desc,col:o.col};
    const slot=this.souls.findIndex(s=>!s);
    if(slot!==-1){ this.souls[slot]=soul; }
    else { this.souls[0]=soul; }
    this.float(this.p.x,this.p.y-25,`Soul: ${soul.name}!`,o.col);
  }

  // ── DAMAGE ──────────────────────────────────────────────────
  hurtPlayer(amt){
    const p=this.p;
    let d=Math.floor(amt*(1-(p.dmgRes||0)));
    if(this.souls.find(s=>s&&s.id==='bone')) d=Math.floor(d*0.9);
    p.hp-=d;
    this.floatNum(p.x,p.y-20,d,0xff3333);
    this.tweens.add({targets:this.gPlayer,alpha:0.2,yoyo:true,duration:80,repeat:1});
    if(p.hp<=0){ p.hp=0; p.dead=true;
      this.time.delayedCall(500,()=>this.scene.start('Over',{room:this.room})); }
  }

  // ── ROOM CLEAR ──────────────────────────────────────────────
  checkClear(){
    if(this.cleared||this.boonUp) return;
    if(this.enemies.length>0 && this.enemies.every(e=>e.dead)){
      this.cleared=true;
      this.drawDoor(true);
      this.float(W/2,H/2-60,'Room Cleared!',0x00ff88);
    }
    if(this.cleared&&!this.boonUp){
      if(this.p.y<WALL+22&&Math.abs(this.p.x-W/2)<42) this.showBoons();
    }
  }

  // ── BOON SELECTION ──────────────────────────────────────────
  showBoons(){
    if(this.boonUp) return;
    this.boonUp=true;
    const picks=Phaser.Utils.Array.Shuffle([...BOON_LIST]).slice(0,3);

    const ov=this.add.graphics().setDepth(30);
    ov.fillStyle(0x000000,0.8); ov.fillRect(0,0,W,H);
    this.add.text(W/2,80,'— CHOOSE A BOON —',{fontSize:'26px',fill:'#ffffff',fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5).setDepth(31);

    picks.forEach((b,i)=>{
      const cx=W/2+(i-1)*250, cy=H/2;
      // card
      const card=this.add.graphics().setDepth(31);
      const draw=(hover)=>{
        card.clear();
        card.fillStyle(hover?0x2a2a5a:0x141430);
        card.fillRoundedRect(cx-105,cy-75,210,150,10);
        card.lineStyle(2,hover?0x8888ff:0x4444aa);
        card.strokeRoundedRect(cx-105,cy-75,210,150,10);
      };
      draw(false);
      this.add.text(cx,cy-40,b.name,{fontSize:'16px',fill:'#aaaaff',fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5).setDepth(32);
      this.add.text(cx,cy-5,b.desc,{fontSize:'13px',fill:'#cccccc',fontFamily:'monospace',wordWrap:{width:190},align:'center'}).setOrigin(0.5).setDepth(32);
      this.add.text(cx,cy+50,`[${i+1}]`,{fontSize:'14px',fill:'#666699',fontFamily:'monospace'}).setOrigin(0.5).setDepth(32);

      const zone=this.add.zone(cx,cy,210,150).setInteractive().setDepth(32);
      zone.on('pointerover',()=>draw(true));
      zone.on('pointerout', ()=>draw(false));
      zone.on('pointerdown',()=>pick(i));
    });

    const kh=(ev)=>{ if(ev.key==='1')pick(0); if(ev.key==='2')pick(1); if(ev.key==='3')pick(2); };
    window.addEventListener('keydown',kh);

    const pick=(i)=>{
      window.removeEventListener('keydown',kh);
      picks[i].apply(this.p);
      this.float(W/2,H/2-80,`+${picks[i].name}`,0xffff44);
      this.boonUp=false;
      this.nextRoom();
    };
  }

  // ── UI ──────────────────────────────────────────────────────
  redrawUI(){
    const p=this.p;
    this.uiHpBg.clear(); this.uiHpBg.fillStyle(0x330000); this.uiHpBg.fillRect(14,34,152,13);
    this.uiHpFg.clear();
    const pct=Math.max(0,p.hp/p.maxHp);
    this.uiHpFg.fillStyle(pct>0.6?0x44ff44:pct>0.3?0xffaa00:0xff2222);
    this.uiHpFg.fillRect(15,35,Math.floor(150*pct),11);
    this.uiHpTxt.setText(`HP ${Math.max(0,p.hp)}/${p.maxHp}`);

    this.uiSlots.forEach((sl,i)=>{
      const sx=sl.sx;
      sl.bg.clear();
      sl.bg.fillStyle(this.souls[i]?0x1a1a3a:0x0d0d1a);
      sl.bg.lineStyle(1,0x333355);
      sl.bg.fillRect(sx,H-58,212,50);
      sl.bg.strokeRect(sx,H-58,212,50);
      if(this.souls[i]){
        const s=this.souls[i];
        sl.ico.clear(); sl.ico.fillStyle(s.col); sl.ico.fillCircle(sx+18,H-33,11);
        sl.nm.setText(s.name).setPosition(sx+36,H-48);
        sl.ds.setText(s.desc).setPosition(sx+36,H-33);
      } else {
        sl.ico.clear(); sl.ico.fillStyle(0x1a1a33); sl.ico.fillCircle(sx+18,H-33,11);
        sl.nm.setText('[ empty ]').setPosition(sx+36,H-43).setFill('#333355');
        sl.ds.setText('');
      }
    });
  }

  // ── HELPERS ─────────────────────────────────────────────────
  floatNum(x,y,n,col){
    const c='#'+col.toString(16).padStart(6,'0');
    const t=this.add.text(x,y,`-${n}`,{fontSize:'14px',fill:c,fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5).setDepth(20);
    this.tweens.add({targets:t,y:y-38,alpha:0,duration:700,onComplete:()=>t.destroy()});
  }
  float(x,y,msg,col){
    const c='#'+col.toString(16).padStart(6,'0');
    const t=this.add.text(x,y,msg,{fontSize:'20px',fill:c,fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5).setDepth(20);
    this.tweens.add({targets:t,y:y-55,alpha:0,duration:1200,onComplete:()=>t.destroy()});
  }
}

// ─── GAME OVER ───────────────────────────────────────────────
class OverScene extends Phaser.Scene {
  constructor(){ super({key:'Over'}); }
  init(d){ this.d=d; }
  create(){
    const {room}=this.d;
    const r=parseInt(localStorage.getItem('sb_runs')||'0')+1;
    const b=Math.max(parseInt(localStorage.getItem('sb_best')||'0'),room);
    localStorage.setItem('sb_runs',r);
    localStorage.setItem('sb_best',b);

    this.add.graphics().fillStyle(0x0a0a0a).fillRect(0,0,W,H);
    this.add.text(W/2,150,'YOU DIED',{fontSize:'54px',fill:'#ff3333',fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5);
    this.add.text(W/2,240,`Reached Room ${room}`,{fontSize:'24px',fill:'#cccccc',fontFamily:'monospace'}).setOrigin(0.5);
    this.add.text(W/2,295,`Best: Room ${b}   Runs: ${r}`,{fontSize:'16px',fill:'#888899',fontFamily:'monospace'}).setOrigin(0.5);

    const btn=this.add.text(W/2,400,'[ PLAY AGAIN ]',{fontSize:'22px',fill:'#4488ff',fontFamily:'monospace',fontStyle:'bold'}).setOrigin(0.5);
    this.tweens.add({targets:btn,alpha:0.4,yoyo:true,duration:700,repeat:-1});

    this.add.text(W/2,480,'M — Back to menu',{fontSize:'13px',fill:'#444466',fontFamily:'monospace'}).setOrigin(0.5);

    this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('Game'));
    this.input.keyboard.once('keydown-SPACE',()=>this.scene.start('Game'));
    this.input.keyboard.once('keydown-M',()=>{
      document.getElementById('menu').style.display='flex';
      const r2=localStorage.getItem('sb_runs')||0;
      const b2=localStorage.getItem('sb_best')||0;
      document.getElementById('stats-txt').textContent=`Runs: ${r2}   Best Room: ${b2}`;
      this.scene.stop();
    });
  }
}

// ─── BOOT ────────────────────────────────────────────────────
const game = new Phaser.Game({
  type: Phaser.CANVAS,
  width: W, height: H,
  backgroundColor: '#0a0a0a',
  parent: 'game-wrap',
  scene: [GameScene, OverScene],
});

// Play button hides menu — game already running underneath
document.getElementById('play-btn').addEventListener('click', ()=>{
  document.getElementById('menu').style.display='none';
});
</script>
