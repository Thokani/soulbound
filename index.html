<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOULBOUND</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;}
#c{display:block;width:100vw;height:100vh;}

#hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
#hp-wrap{position:absolute;top:18px;left:18px;background:rgba(0,0,0,.5);padding:8px 12px;border-left:2px solid #8844ff;backdrop-filter:blur(4px);}
#hp-label{font-family:'Cinzel',serif;font-size:11px;color:#ccaaff;margin-bottom:5px;letter-spacing:2px;}
#hp-bg{width:160px;height:8px;background:#1a0030;}
#hp-fg{height:100%;background:linear-gradient(90deg,#8844ff,#cc88ff);transition:width .1s;}
#room-lbl{position:absolute;top:18px;right:18px;font-family:'Cinzel',serif;font-size:12px;color:#bbaaee;letter-spacing:3px;text-shadow:0 0 20px #8844ff;background:rgba(0,0,0,.4);padding:6px 12px;border-right:2px solid #8844ff;}

#souls-bar{position:absolute;bottom:0;left:0;right:0;height:64px;background:linear-gradient(transparent,rgba(0,0,0,.8));display:flex;align-items:center;justify-content:center;gap:12px;padding:0 20px;}
.soul-slot{display:flex;align-items:center;gap:8px;background:rgba(10,0,20,.6);border:1px solid rgba(136,68,255,.25);padding:6px 10px;min-width:180px;backdrop-filter:blur(4px);}
.soul-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor;}
.soul-name{font-family:'Cinzel',serif;font-size:8px;color:#ddccff;letter-spacing:1px;}
.soul-desc{font-family:'Cinzel',serif;font-size:7px;color:#9988bb;margin-top:2px;}

.dmg{position:fixed;font-family:'Cinzel',serif;font-size:13px;pointer-events:none;z-index:20;text-shadow:0 0 10px currentColor;transform:translateX(-50%);animation:floatUp .8s forwards;font-weight:600;}
@keyframes floatUp{to{transform:translateX(-50%) translateY(-40px);opacity:0;}}

#boon-overlay{display:none;position:fixed;inset:0;background:rgba(5,0,15,.92);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
#boon-overlay h2{font-family:'Cinzel',serif;font-size:22px;color:#cc88ff;letter-spacing:6px;text-shadow:0 0 30px #8844ff;}
#boon-cards{display:flex;gap:20px;}
.boon-card{width:200px;border:1px solid rgba(136,68,255,.4);background:rgba(20,0,40,.8);padding:20px;cursor:pointer;transition:all .15s;backdrop-filter:blur(8px);}
.boon-card:hover{background:rgba(40,0,80,.9);border-color:#8844ff;box-shadow:0 0 20px rgba(136,68,255,.3);}
.boon-card h3{font-family:'Cinzel',serif;font-size:10px;color:#cc88ff;margin-bottom:10px;letter-spacing:2px;}
.boon-card p{font-family:'Cinzel',serif;font-size:8px;color:#998bbb;line-height:1.7;}
.boon-card .key{font-size:8px;color:#443366;margin-top:10px;font-family:'Cinzel',serif;}

#over{display:none;position:fixed;inset:0;background:rgba(5,0,15,.95);z-index:60;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#over h1{font-family:'Cinzel',serif;font-size:32px;color:#ff4466;letter-spacing:8px;text-shadow:0 0 40px #ff0033;}
#over p{font-family:'Cinzel',serif;font-size:11px;color:#ccbbee;letter-spacing:2px;}
#over small{font-family:'Cinzel',serif;font-size:9px;color:#443355;}
#over button{margin-top:14px;font-family:'Cinzel',serif;background:transparent;color:#cc88ff;border:1px solid #8844ff;padding:12px 32px;font-size:12px;cursor:pointer;letter-spacing:4px;}
#over button:hover{background:rgba(136,68,255,.2);}

#menu{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow:hidden;}
#menu-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#87ceeb 0%,#4488cc 40%,#2244aa 100%);}
#menu-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px;}
#menu h1{font-family:'Cinzel',serif;font-size:42px;color:#ffffff;letter-spacing:10px;text-shadow:0 0 30px #ffffff,2px 2px 0 #4466aa;margin-bottom:4px;}
#menu .sub{font-family:'Cinzel',serif;font-size:10px;color:#cce8ff;letter-spacing:3px;}
#menu .ctrl{font-family:'Cinzel',serif;font-size:8px;color:#443366;margin:2px 0;letter-spacing:1px;}
#menu #mbest{font-family:'Cinzel',serif;font-size:8px;color:#332244;margin-top:8px;letter-spacing:2px;}
#menu button{margin-top:18px;font-family:'Cinzel',serif;background:transparent;color:#cc88ff;border:1px solid rgba(136,68,255,.6);padding:14px 40px;font-size:13px;cursor:pointer;letter-spacing:6px;text-shadow:0 0 20px #8844ff;}
#menu button:hover{background:rgba(136,68,255,.15);border-color:#cc88ff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="hp-wrap">
    <div id="hp-label">VITALITY</div>
    <div id="hp-bg"><div id="hp-fg" style="width:100%"></div></div>
    <div style="font-family:'Cinzel',serif;font-size:7px;color:#886699;margin-top:3px;"><span id="hp-num">100</span> / <span id="hp-max">100</span></div>
  </div>
  <div id="room-lbl">FLOOR I</div>
  <div id="souls-bar">
    <div class="soul-slot" id="slot0"><div class="soul-dot" style="background:#332244;color:#332244"></div><div><div class="soul-name">EMPTY</div></div></div>
    <div class="soul-slot" id="slot1"><div class="soul-dot" style="background:#332244;color:#332244"></div><div><div class="soul-name">EMPTY</div></div></div>
    <div class="soul-slot" id="slot2"><div class="soul-dot" style="background:#332244;color:#332244"></div><div><div class="soul-name">EMPTY</div></div></div>
    <div class="soul-slot" id="slot3"><div class="soul-dot" style="background:#332244;color:#332244"></div><div><div class="soul-name">EMPTY</div></div></div>
  </div>
</div>

<div id="boon-overlay">
  <h2>CHOOSE YOUR PATH</h2>
  <div id="boon-cards"></div>
</div>

<div id="over">
  <h1>FALLEN</h1>
  <p id="over-room"></p>
  <p id="over-best"></p>
  <small>— press enter to rise again —</small>
  <button onclick="restartGame()">CONTINUE</button>
</div>

<div id="menu">
  <div id="menu-bg"></div>
  <div id="menu-content">
    <h1>SOULBOUND</h1>
    <p class="sub">an ancient pact with the fallen</p>
    <p class="ctrl">WASD — Move &nbsp;·&nbsp; SPACE — Strike &nbsp;·&nbsp; SHIFT — Evade</p>
    <p class="ctrl">Absorb souls of the fallen · Choose boons · Delve deeper</p>
    <p id="mbest"></p>
    <button onclick="startGame()">ENTER THE RUINS</button>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

const sbR=parseInt(localStorage.getItem('sb_runs')||'0');
const sbB=parseInt(localStorage.getItem('sb_best')||'0');
if(sbR>0) document.getElementById('mbest').textContent=`${sbR} JOURNEYS · DEEPEST FLOOR ${sbB}`;

const BOONS=[
  {id:'iron',  name:'IRON RESOLVE',  desc:'Maximum vitality +20',        apply:p=>{p.maxHp+=20;p.hp=Math.min(p.hp+20,p.maxHp);}},
  {id:'swift', name:'SWIFT HAND',    desc:'Attack tempo increases',       apply:p=>{p.atkCd=Math.max(0.15,p.atkCd-0.1);}},
  {id:'life',  name:'SOUL DRAIN',    desc:'Restore 5 vitality per kill',  apply:p=>{p.lifesteal+=5;}},
  {id:'bersrk',name:'BATTLE RAGE',   desc:'+25% power below half health', apply:p=>{p.berserker=true;}},
  {id:'slink', name:'SOUL BOND',     desc:'+5% power per bound soul',     apply:p=>{p.soulLink=true;}},
  {id:'tough', name:'ANCIENT WARDS', desc:'Suffer 10% less damage',       apply:p=>{p.dmgRes=Math.min(0.5,(p.dmgRes||0)+0.1);}},
  {id:'speed', name:'WIND STEP',     desc:'Movement speed +15%',          apply:p=>{p.spd=Math.min(10,p.spd*1.15);}},
];
const SOUL_DEF={
  bone:  {name:'BONE WARD',   desc:'10% less damage', col:0xddcc88,css:'#ddcc88'},
  shadow:{name:'SHADOW VEIL', desc:'Dodge cd -30%',   col:0xaa55ff,css:'#aa55ff'},
  fury:  {name:'BATTLE FURY', desc:'+15% power',      col:0xff5522,css:'#ff5522'},
};

// ── RENDERER ──────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x87ceeb);



const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0xb8d4f0,0.02);

const camera=new THREE.PerspectiveCamera(65,window.innerWidth/window.innerHeight,0.1,150);

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── LIGHTING (Frieren-esque: cold moonlight + warm magic) ──
const ambient=new THREE.AmbientLight(0xffeedd,1.2);
scene.add(ambient);
// Moonlight
const moon=new THREE.DirectionalLight(0xfffbe0,2.2);
moon.position.set(8,20,5);
moon.castShadow=true;
moon.shadow.mapSize.set(2048,2048);
moon.shadow.camera.near=0.5; moon.shadow.camera.far=80;
moon.shadow.camera.left=-20; moon.shadow.camera.right=20;
moon.shadow.camera.top=20;   moon.shadow.camera.bottom=-20;
moon.shadow.bias=-0.001;
scene.add(moon);
// Rim light (purple magic glow)
const rim=new THREE.DirectionalLight(0xaaddff,0.4);
rim.position.set(8,5,8);
scene.add(rim);

// ── MATERIALS ────────────────────────────────────────
const flat=(c,em=0)=>new THREE.MeshToonMaterial({color:c,emissive:em});
const flatT=(c,op=0.7)=>new THREE.MeshToonMaterial({color:c,transparent:true,opacity:op});

// ── SCENE ELEMENTS ───────────────────────────────────
function buildEnvironment(){
  // Ground — mossy ancient stone
  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(60,60,20,20),
    new THREE.MeshToonMaterial({color:0x5ab52e})
  );
  // Slightly undulate the ground for a natural feel
  const pos=ground.geometry.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), z=pos.getY(i);
    if(Math.abs(x)<13&&Math.abs(z)<13) continue; // keep arena flat
    pos.setZ(i,(Math.random()-0.5)*0.4);
  }
  ground.geometry.computeVertexNormals();
  ground.rotation.x=-Math.PI/2;
  ground.receiveShadow=true;
  scene.add(ground);

  // Trees (low-poly pines around the perimeter)
  for(let i=0;i<30;i++){
    const angle=Math.random()*Math.PI*2;
    const radius=18+Math.random()*10;
    const tx=Math.cos(angle)*radius, tz=Math.sin(angle)*radius;
    const treeH=3+Math.random()*3;
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,treeH*0.4,5),flat(0x7a4a1a));
    trunk.position.set(tx,treeH*0.2,tz);
    trunk.castShadow=true;
    scene.add(trunk);
    // Multiple cone layers for lush tree
    const colors=[0x3d9e22,0x4ab828,0x2d8a18];
    for(let j=0;j<3;j++){
      const cone=new THREE.Mesh(
        new THREE.ConeGeometry((0.8-j*0.15)*(0.7+Math.random()*0.3),treeH*(0.5-j*0.05),5+j),
        flat(colors[j])
      );
      cone.position.set(tx,treeH*(0.4+j*0.22),tz);
      cone.rotation.y=Math.random()*Math.PI;
      cone.castShadow=true;
      scene.add(cone);
    }
  }

  // Ancient stone ruins (pillars, broken walls)
  const stoneMat=flat(0xd4c4a0);
  const stoneDark=flat(0xb8a882);
  // Pillars
  const pillarPositions=[
    [-12,0,-12],[12,0,-12],[-12,0,12],[12,0,12],
    [-8,0,-14],[8,0,-14],[-14,0,0],[14,0,0],
  ];
  pillarPositions.forEach(([px,py,pz])=>{
    const h=2+Math.random()*2;
    const p=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.3,h,6),stoneMat.clone());
    p.position.set(px,h/2,pz);
    p.castShadow=true; p.receiveShadow=true;
    scene.add(p);
    // Cap stone
    const cap=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.2,0.65),stoneDark.clone());
    cap.position.set(px,h+0.1,pz);
    scene.add(cap);
  });

  // Scattered rubble
  for(let i=0;i<20;i++){
    const angle=Math.random()*Math.PI*2;
    const r=12+Math.random()*5;
    const rx=Math.cos(angle)*r, rz=Math.sin(angle)*r;
    const size=0.2+Math.random()*0.5;
    const rock=new THREE.Mesh(
      new THREE.DodecahedronGeometry(size,0),
      flat(0xb0a090)
    );
    rock.position.set(rx,size*0.4,rz);
    rock.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
    rock.castShadow=true;
    scene.add(rock);
  }

  // Magical particles (floating wisps of light)
  for(let i=0;i<25;i++){
    const angle=Math.random()*Math.PI*2;
    const r=8+Math.random()*12;
    const px=Math.cos(angle)*r, pz=Math.sin(angle)*r;
    const wisp=new THREE.Mesh(new THREE.SphereGeometry(0.05,4,4),
      new THREE.MeshBasicMaterial({color:Math.random()<0.5?0xffdd44:0x44ffaa}));
    wisp.position.set(px,0.5+Math.random()*2,pz);
    wisp._orbitAngle=angle;
    wisp._orbitR=r;
    wisp._orbitSpeed=0.1+Math.random()*0.2;
    wisp._bobOffset=Math.random()*Math.PI*2;
    scene.add(wisp);
    ambientWisps.push(wisp);
  }
}

const ambientWisps=[];

// ── ARENA BARRIER & PORTAL ────────────────────────────
const ROOM=12;
let portalMesh=null, portalLight=null, arenaGroup=null;

function buildArena(){
  if(arenaGroup){scene.remove(arenaGroup);}
  arenaGroup=new THREE.Group();

  // Invisible barrier hints (glowing runes on ground edges)
  const runeMat=new THREE.MeshBasicMaterial({color:0x440066});
  for(let i=0;i<8;i++){
    const angle=(i/8)*Math.PI*2;
    const rune=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.5),runeMat);
    rune.rotation.x=-Math.PI/2;
    rune.position.set(Math.cos(angle)*ROOM,0.02,Math.sin(angle)*ROOM);
    arenaGroup.add(rune);
  }

  // Portal (north, inactive)
  portalMesh=new THREE.Mesh(
    new THREE.TorusGeometry(1.2,0.2,6,12),
    flat(0x8866dd,0x443388)
  );
  portalMesh.position.set(0,1.5,-ROOM+1);
  portalMesh.castShadow=false;
  arenaGroup.add(portalMesh);

  // Portal fill (plane)
  const fill=new THREE.Mesh(
    new THREE.CircleGeometry(1.0,12),
    new THREE.MeshBasicMaterial({color:0x220033,transparent:true,opacity:0.6,side:THREE.DoubleSide})
  );
  fill.position.set(0,1.5,-ROOM+1.05);
  arenaGroup.add(fill);

  portalLight=new THREE.PointLight(0x8833ff,0.5,5);
  portalLight.position.set(0,1.5,-ROOM+1);
  arenaGroup.add(portalLight);

  scene.add(arenaGroup);
}

function openPortal(){
  portalMesh.material.color.setHex(0x00aaff);
  portalMesh.material.emissive.setHex(0x004499);
  portalLight.color.setHex(0x44aaff);
  portalLight.intensity=3;
}

// ── PLAYER ────────────────────────────────────────────
function makePlayerMesh(){
  const g=new THREE.Group();
  // Body (slim, tall — anime proportions)
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.22,0.9,7),flat(0x4477dd));
  body.position.y=0.55; body.castShadow=true; g.add(body);
  // Cloak/cape
  const cloak=new THREE.Mesh(new THREE.ConeGeometry(0.28,0.8,6),flat(0x2244aa));
  cloak.position.y=0.4; cloak.castShadow=true; g.add(cloak);
  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.2,7,6),flat(0xffcc99));
  head.position.y=1.1; head.castShadow=true; g.add(head);
  // Hair (Frieren-ish long hair)
  const hair=new THREE.Mesh(new THREE.ConeGeometry(0.22,0.5,6),flat(0xeeeeff));
  hair.position.y=1.15; hair.rotation.x=0.2; hair.castShadow=true; g.add(hair);
  // Staff
  const staff=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,1.4,5),flat(0x885522));
  staff.position.set(0.3,0.7,0.1); staff.rotation.z=0.15; staff.castShadow=true; g.add(staff);
  // Staff gem
  const gem=new THREE.Mesh(new THREE.OctahedronGeometry(0.1),flat(0x66aaff,0x2255cc));
  gem.position.set(0.35,1.4,0.1); g.add(gem);
  // Glow
  const glow=new THREE.PointLight(0x4422aa,0.5,2);
  glow.position.set(0.35,1.4,0.1); g.add(glow);
  g._staffGlow=glow;
  return g;
}

// ── ENEMIES ───────────────────────────────────────────
function makeSkeletonMesh(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.16,0.8,5),flat(0xccccaa));
  body.position.y=0.5; body.castShadow=true; g.add(body);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.18,5,4),flat(0xddddbb));
  head.position.y=1.05; head.castShadow=true; g.add(head);
  const ej=flat(0x00ffff,0x00aaaa);
  [-1,1].forEach(s=>{
    const e=new THREE.Mesh(new THREE.SphereGeometry(0.04,4,3),ej);
    e.position.set(s*0.07,1.06,0.16); g.add(e);
  });
  const sword=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.5,0.05),flat(0x888888));
  sword.position.set(0.3,0.6,-0.1); g.add(sword);
  return g;
}

function makeWispMesh(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.SphereGeometry(0.28,7,6),flat(0x9944ee,0x6622bb));
  body.castShadow=false; g.add(body);
  const inner=new THREE.Mesh(new THREE.SphereGeometry(0.14,5,4),flat(0xffffff,0xddaaff));
  g.add(inner);
  const glow=new THREE.PointLight(0xaa44ff,2,4);
  g.add(glow);
  return g;
}

function makeDemonMesh(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.65,0.45),flat(0xaa1100));
  body.position.y=0.45; body.castShadow=true; g.add(body);
  const head=new THREE.Mesh(new THREE.ConeGeometry(0.25,0.4,5),flat(0x881100));
  head.position.y=1.0; head.castShadow=true; g.add(head);
  [-1,1].forEach(s=>{
    const horn=new THREE.Mesh(new THREE.ConeGeometry(0.05,0.28,4),flat(0x220000));
    horn.position.set(s*0.14,1.25,0); horn.rotation.z=-s*0.3; g.add(horn);
  });
  const glow=new THREE.PointLight(0xff2200,0.8,3);
  glow.position.y=0.5; g.add(glow);
  return g;
}

// ── GAME STATE ────────────────────────────────────────
let player, pState, enemies, projectiles, orbList;
let roomNum=0, cleared=false, boonUp=false, gameRunning=false;
let souls=[];

// Camera state
const camPos=new THREE.Vector3();
const camLookAt=new THREE.Vector3();

function initGame(){
  if(player) scene.remove(player);
  enemies=[]; projectiles=[]; orbList=[]; souls=[];
  document.querySelectorAll('.dmg').forEach(d=>d.remove());

  player=makePlayerMesh();
  scene.add(player);

  pState={
    x:0, z:8, rx:0,
    hp:100, maxHp:100, spd:6,
    atkCd:0.5, atkT:0,
    dodgeCd:1.2, dodgeT:0,
    dodging:false, dodgeDur:0, dvx:0, dvz:0,
    angle:Math.PI, // facing south
    lifesteal:0, berserker:false, soulLink:false, dmgRes:0,
    dead:false,
  };
  player.position.set(0,0,8);
  camPos.set(0,4,12);

  roomNum=0;
  nextRoom();
}

function nextRoom(){
  roomNum++;
  cleared=false; boonUp=false;
  enemies.forEach(e=>{scene.remove(e.mesh);e.hpEl?.remove();});
  enemies=[];
  projectiles.forEach(p=>scene.remove(p.mesh)); projectiles=[];
  orbList.forEach(o=>{scene.remove(o.mesh);if(o.light)scene.remove(o.light);}); orbList=[];
  document.querySelectorAll('.dmg').forEach(d=>d.remove());

  buildArena();
  spawnEnemies();

  pState.x=0; pState.z=8; pState.angle=Math.PI;
  player.position.set(0,0,8);

  const romans=['I','II','III','IV','V','VI','VII','VIII','IX','X'];
  document.getElementById('room-lbl').textContent=`FLOOR ${romans[Math.min(roomNum-1,9)]}`;
  updateHUD();
}

function spawnEnemies(){
  const boss=roomNum%5===0;
  const cnt=boss?1:Math.floor(Math.random()*3)+3+Math.floor(roomNum/3);
  for(let i=0;i<cnt;i++){
    const t=boss?2:[0,1,2][Math.floor(Math.random()*3)];
    let ex,ez,att=0;
    do{
      const angle=Math.random()*Math.PI*2;
      const r=4+Math.random()*(ROOM-5);
      ex=Math.cos(angle)*r; ez=Math.sin(angle)*r;
      att++;
    }while(Math.sqrt(ex*ex+ez*ez)<5&&att<20);

    let mesh,hp,spd,dmg,soul,ranged=false,charge=false;
    if(t===0){mesh=makeSkeletonMesh();hp=40;spd=3;dmg=12;soul='bone';}
    else if(t===1){mesh=makeWispMesh();hp=25;spd=6;dmg=8;soul='shadow';ranged=true;}
    else{mesh=makeDemonMesh();hp=60;spd=2;dmg=18;soul='fury';charge=true;}
    if(boss&&t===2){hp=200;spd=3.5;dmg=22;}

    mesh.position.set(ex,0,ez);
    scene.add(mesh);

    const hpEl=document.createElement('div');
    hpEl.style.cssText='position:fixed;pointer-events:none;z-index:15;';
    hpEl.innerHTML=`<div style="width:36px;height:3px;background:rgba(0,0,0,.5);"><div class="ehpfg" style="height:100%;background:rgba(180,60,180,.8);width:100%;transition:width .1s;"></div></div>`;
    document.body.appendChild(hpEl);

    enemies.push({mesh,hp,maxHp:hp,spd,dmg,soul,ranged,charge,
      x:ex,z:ez,aiT:Math.random(),projT:2,chargeT:0,charging:false,cvx:0,cvz:0,
      dead:false,hpEl});
  }
}

// ── KEYS ──────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',e=>keys[e.code]=false);

// ── DAMAGE CALC ───────────────────────────────────────
function pDmg(){
  const p=pState;
  let d=20;
  if(souls.find(s=>s?.id==='fury'))d*=1.15;
  if(p.berserker&&p.hp<p.maxHp*0.5)d*=1.25;
  if(p.soulLink)d*=1+souls.filter(s=>s).length*0.05;
  return Math.floor(d);
}

// ── MAIN LOOP ─────────────────────────────────────────
let lastT=0, wispT=0;

function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-lastT)/1000,0.05);
  lastT=t;
  wispT+=dt;

  // Animate ambient wisps
  ambientWisps.forEach(w=>{
    w._orbitAngle+=w._orbitSpeed*dt;
    w.position.x=Math.cos(w._orbitAngle)*w._orbitR;
    w.position.z=Math.sin(w._orbitAngle)*w._orbitR;
    w.position.y=1+Math.sin(wispT+w._bobOffset)*0.5;
  });

  if(!gameRunning||pState.dead||boonUp){
    renderer.render(scene,camera);
    return;
  }

  const p=pState;

  // ── MOVE PLAYER ──────────────────────────────────
  if(p.dodging){
    p.dodgeDur-=dt;
    if(p.dodgeDur<=0)p.dodging=false;
    p.x+=p.dvx*dt; p.z+=p.dvz*dt;
  }else{
    let mx=0,mz=0;
    if(keys['KeyA']||keys['ArrowLeft'])mx-=1;
    if(keys['KeyD']||keys['ArrowRight'])mx+=1;
    if(keys['KeyW']||keys['ArrowUp'])mz-=1;
    if(keys['KeyS']||keys['ArrowDown'])mz+=1;

    if(mx||mz){
      const l=Math.sqrt(mx*mx+mz*mz);
      mx/=l; mz/=l;
      p.x+=mx*p.spd*dt;
      p.z+=mz*p.spd*dt;
      // Rotate player to face movement direction
      const targetAngle=Math.atan2(mx,mz);
      let da=targetAngle-p.angle;
      while(da>Math.PI)da-=Math.PI*2;
      while(da<-Math.PI)da+=Math.PI*2;
      p.angle+=da*0.2;
    }

    // Arena boundary
    const dist=Math.sqrt(p.x*p.x+p.z*p.z);
    if(dist>ROOM-0.5){const nx=p.x/dist,nz=p.z/dist;p.x=nx*(ROOM-0.5);p.z=nz*(ROOM-0.5);}

    p.dodgeT=Math.max(0,p.dodgeT-dt);
    if(keys['ShiftLeft']&&p.dodgeT<=0&&(mx||mz)){
      p.dvx=mx*20; p.dvz=mz*20;
      p.dodging=true; p.dodgeDur=0.2;
      p.dodgeT=souls.find(s=>s?.id==='shadow')?p.dodgeCd*0.7:p.dodgeCd;
      keys['ShiftLeft']=false;
    }
  }
  p.x=Math.max(-ROOM+0.5,Math.min(ROOM-0.5,p.x));
  p.z=Math.max(-ROOM+0.5,Math.min(ROOM-0.5,p.z));
  player.position.set(p.x,0,p.z);
  player.rotation.y=p.angle;
  // Dodging effect
  player.traverse(m=>{if(m.isMesh){m.material.transparent=p.dodging;m.material.opacity=p.dodging?0.4:1;}});

  // Staff gem pulse
  if(player._staffGlow) player._staffGlow.intensity=0.5+Math.sin(wispT*3)*0.2;

  // ── THIRD-PERSON CAMERA ──────────────────────────
  const camDist=5.5, camHeight=3.2;
  const camAngle=p.angle+Math.PI; // behind player
  const targetCamX=p.x+Math.sin(camAngle)*camDist;
  const targetCamZ=p.z+Math.cos(camAngle)*camDist;
  camPos.x+=(targetCamX-camPos.x)*0.1;
  camPos.y+=(camHeight-camPos.y)*0.1;
  camPos.z+=(targetCamZ-camPos.z)*0.1;
  camera.position.copy(camPos);
  // Look slightly ahead of player
  const lookX=p.x-Math.sin(p.angle)*1.5;
  const lookZ=p.z-Math.cos(p.angle)*1.5;
  camLookAt.x+=(lookX-camLookAt.x)*0.1;
  camLookAt.y+=(0.8-camLookAt.y)*0.1;
  camLookAt.z+=(lookZ-camLookAt.z)*0.1;
  camera.lookAt(camLookAt);

  // ── ATTACK ───────────────────────────────────────
  p.atkT=Math.max(0,p.atkT-dt);
  if(keys['Space']&&p.atkT<=0){
    p.atkT=p.atkCd;
    keys['Space']=false;
    const dmg=pDmg(), range=3.5;
    const fx=-Math.sin(p.angle), fz=-Math.cos(p.angle);
    enemies.forEach(e=>{
      if(e.dead)return;
      const dx=e.x-p.x, dz=e.z-p.z, dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>range)return;
      const dot=(dx/dist)*fx+(dz/dist)*fz;
      if(dot<0.1)return;
      e.hp-=dmg;
      floatDmg(e.x,e.z,dmg,'#ddccff');
      e.mesh.traverse(m=>{if(m.isMesh){m.material.emissive.setHex(0x441111);}});
      setTimeout(()=>e.mesh.traverse(m=>{if(m.isMesh)m.material.emissive.setHex(0);}),100);
      if(e.hp<=0){
        e.dead=true;
        pState.hp=Math.min(pState.maxHp,pState.hp+pState.lifesteal);
        scene.remove(e.mesh); e.hpEl.remove();
        if(Math.random()<0.4) spawnOrb(e.x,e.z,e.soul);
      } else updateEnemyHP(e);
    });
    // Attack flash on staff gem
    player.traverse(m=>{if(m.isMesh&&m.material.emissive)m.material.emissive.setHex(0x8844ff);});
    setTimeout(()=>player.traverse(m=>{if(m.isMesh&&m.material.emissive)m.material.emissive.setHex(0);}),150);
  }

  // ── ENEMIES ──────────────────────────────────────
  enemies.forEach(e=>{
    if(e.dead)return;
    e.aiT-=dt;
    const dx=p.x-e.x, dz=p.z-e.z, dist=Math.sqrt(dx*dx+dz*dz);
    const nx=dx/dist, nz=dz/dist;

    if(e.ranged){
      e.projT-=dt;
      const dir=dist>9?1:dist<4?-1:0;
      e.x+=nx*dir*e.spd*dt; e.z+=nz*dir*e.spd*dt;
      if(e.projT<=0){
        e.projT=2.2;
        const pm=new THREE.Mesh(new THREE.SphereGeometry(0.14,5,4),flat(0xcc44ff,0x8811cc));
        pm.position.set(e.x,0.8,e.z); scene.add(pm);
        projectiles.push({mesh:pm,x:e.x,z:e.z,vx:nx*8,vz:nz*8,dmg:e.dmg,life:3});
      }
      // Float/bob
      e.mesh.position.y=Math.sin(wispT*2+e.aiT)*0.4+0.5;
    }else if(e.charge){
      if(!e.charging){
        e.x+=nx*e.spd*dt; e.z+=nz*e.spd*dt;
        if(e.aiT<=0&&dist<9){
          e.aiT=2.5; e.charging=true; e.chargeT=0.45;
          e.cvx=nx*14; e.cvz=nz*14;
          e.mesh.traverse(m=>{if(m.isMesh)m.material.emissive.setHex(0x550000);});
        }
      }else{
        e.chargeT-=dt; e.x+=e.cvx*dt; e.z+=e.cvz*dt;
        if(e.chargeT<=0){e.charging=false;e.mesh.traverse(m=>{if(m.isMesh)m.material.emissive.setHex(0);});}
        if(dist<1.3&&!p.dodging) hurtPlayer(e.dmg);
      }
    }else{
      e.x+=nx*e.spd*dt; e.z+=nz*e.spd*dt;
      if(dist<1.3&&e.aiT<=0){e.aiT=1.2;if(!p.dodging)hurtPlayer(e.dmg);}
    }

    // Boundary
    const ed=Math.sqrt(e.x*e.x+e.z*e.z);
    if(ed>ROOM-0.5){e.x=(e.x/ed)*(ROOM-0.5);e.z=(e.z/ed)*(ROOM-0.5);}
    e.mesh.position.x=e.x; e.mesh.position.z=e.z;
    if(nx||nz) e.mesh.rotation.y=Math.atan2(nx,nz);

    updateEnemyHP(e);
  });

  // ── PROJECTILES ──────────────────────────────────
  projectiles=projectiles.filter(pr=>{
    pr.x+=pr.vx*dt; pr.z+=pr.vz*dt; pr.life-=dt;
    pr.mesh.position.set(pr.x,0.8,pr.z);
    pr.mesh.rotation.y+=dt*6;
    if(pr.life<=0||Math.sqrt(pr.x*pr.x+pr.z*pr.z)>ROOM){scene.remove(pr.mesh);return false;}
    const dx=pr.x-p.x,dz=pr.z-p.z;
    if(!p.dodging&&Math.sqrt(dx*dx+dz*dz)<0.8){hurtPlayer(pr.dmg);scene.remove(pr.mesh);return false;}
    return true;
  });

  // ── ORBS ─────────────────────────────────────────
  orbList=orbList.filter(o=>{
    if(o.gone)return false;
    o.t+=dt;
    o.mesh.position.y=o.baseY+Math.sin(o.t*3)*0.2;
    o.mesh.rotation.y=o.t*2;
    if(o.light) o.light.position.y=o.mesh.position.y;
    const dx=o.x-p.x,dz=o.z-p.z;
    if(Math.sqrt(dx*dx+dz*dz)<1.2){
      o.gone=true; scene.remove(o.mesh);
      if(o.light)scene.remove(o.light);
      absorbSoul(o.soulId); return false;
    }
    return true;
  });

  // ── ROOM CLEAR ───────────────────────────────────
  if(!cleared&&!boonUp&&enemies.length>0&&enemies.every(e=>e.dead)){
    cleared=true;
    openPortal();
    floatDmg(p.x,p.z,'ENEMIES VANQUISHED','#88ffcc',true);
  }
  // Enter portal (walk to north, close to portal)
  if(cleared&&!boonUp){
    const dx=p.x-0, dz=p.z-(-ROOM+1.5);
    if(Math.sqrt(dx*dx+dz*dz)<2) showBoons();
  }

  updateHUD();
  renderer.render(scene,camera);
}

function updateEnemyHP(e){
  const pct=Math.max(0,e.hp/e.maxHp);
  const fg=e.hpEl?.querySelector('.ehpfg');
  if(fg) fg.style.width=(pct*100)+'%';
  const pos3=new THREE.Vector3(e.x,2.2,e.z);
  const pos2=pos3.clone().project(camera);
  if(pos2.z>1){e.hpEl.style.display='none';return;}
  e.hpEl.style.display='block';
  e.hpEl.style.left=((pos2.x*0.5+0.5)*window.innerWidth-18)+'px';
  e.hpEl.style.top=((-pos2.y*0.5+0.5)*window.innerHeight)+'px';
}

function spawnOrb(x,z,soulId){
  const col=SOUL_DEF[soulId].col;
  const orb=new THREE.Mesh(new THREE.OctahedronGeometry(0.2,1),flat(col,Math.floor(col*0.5)));
  orb.position.set(x,0.5,z);
  scene.add(orb);
  const light=new THREE.PointLight(col,2,3);
  light.position.set(x,0.5,z);
  scene.add(light);
  orbList.push({mesh:orb,light,x,z,baseY:0.5,t:0,soulId,gone:false});
}

function hurtPlayer(amt){
  const p=pState;
  let d=Math.floor(amt*(1-(p.dmgRes||0)));
  if(souls.find(s=>s?.id==='bone'))d=Math.floor(d*0.9);
  p.hp-=d;
  floatDmg(p.x,p.z,d,'#ff6677');
  // Camera shake
  const cp=camPos.clone();
  camPos.x+=((Math.random()-0.5)*0.5);
  camPos.z+=((Math.random()-0.5)*0.5);
  setTimeout(()=>{camPos.copy(cp);},100);
  if(p.hp<=0){
    p.hp=0; p.dead=true;
    player.traverse(m=>{if(m.isMesh)m.material.emissive.setHex(0x440000);});
    setTimeout(showGameOver,800);
  }
}

function absorbSoul(soulId){
  const sd=SOUL_DEF[soulId];
  const soul={id:soulId,...sd};
  const slot=souls.findIndex(s=>!s);
  if(slot!==-1)souls[slot]=soul; else souls[0]=soul;
  floatDmg(pState.x,pState.z,`${sd.name} ABSORBED`,'#cc88ff',true);
  updateHUD();
}

function updateHUD(){
  const p=pState;
  const pct=Math.max(0,p.hp/p.maxHp);
  document.getElementById('hp-fg').style.width=(pct*100)+'%';
  document.getElementById('hp-num').textContent=Math.max(0,p.hp);
  document.getElementById('hp-max').textContent=p.maxHp;
  for(let i=0;i<4;i++){
    const sl=document.getElementById('slot'+i);
    const s=souls[i];
    if(s){
      sl.innerHTML=`<div class="soul-dot" style="background:${s.css};color:${s.css};"></div><div><div class="soul-name">${s.name}</div><div class="soul-desc">${s.desc}</div></div>`;
    }else{
      sl.innerHTML=`<div class="soul-dot" style="background:#1a0a30;color:#1a0a30;"></div><div><div class="soul-name" style="color:#2a1a40">EMPTY VESSEL</div></div>`;
    }
  }
}

function floatDmg(wx,wz,text,color,big=false){
  const pos3=new THREE.Vector3(wx,1.5,wz);
  const pos2=pos3.clone().project(camera);
  if(pos2.z>1)return;
  const sx=(pos2.x*0.5+0.5)*window.innerWidth;
  const sy=(-pos2.y*0.5+0.5)*window.innerHeight;
  const d=document.createElement('div');
  d.className='dmg';
  d.style.cssText=`left:${sx}px;top:${sy}px;color:${color};font-size:${big?'11px':'9px'};font-family:'Cinzel',serif;`;
  d.textContent=text;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),800);
}

function showBoons(){
  if(boonUp)return; boonUp=true;
  const picks=shuffle([...BOONS]).slice(0,3);
  const cards=document.getElementById('boon-cards');
  cards.innerHTML='';
  picks.forEach((b,i)=>{
    const c=document.createElement('div');
    c.className='boon-card';
    c.innerHTML=`<h3>${b.name}</h3><p>${b.desc}</p><p class="key">— ${i+1} —</p>`;
    c.onclick=()=>pick(i);
    cards.appendChild(c);
  });
  document.getElementById('boon-overlay').style.display='flex';
  const kh=ev=>{if(['1','2','3'].includes(ev.key)){pick(parseInt(ev.key)-1);window.removeEventListener('keydown',kh);}};
  window.addEventListener('keydown',kh);
  function pick(i){
    picks[i].apply(pState);
    document.getElementById('boon-overlay').style.display='none';
    boonUp=false; nextRoom();
  }
}

function showGameOver(){
  const r=parseInt(localStorage.getItem('sb_runs')||'0')+1;
  const b=Math.max(parseInt(localStorage.getItem('sb_best')||'0'),roomNum);
  localStorage.setItem('sb_runs',r); localStorage.setItem('sb_best',b);
  document.getElementById('over-room').textContent=`Reached Floor ${roomNum}`;
  document.getElementById('over-best').textContent=`Deepest: Floor ${b}   Journeys: ${r}`;
  document.getElementById('over').style.display='flex';
}

window.restartGame=function(){
  document.getElementById('over').style.display='none';
  enemies.forEach(e=>{scene.remove(e.mesh);e.hpEl?.remove();});
  projectiles.forEach(p=>scene.remove(p.mesh));
  orbList.forEach(o=>{scene.remove(o.mesh);if(o.light)scene.remove(o.light);});
  initGame();
};
document.addEventListener('keydown',e=>{
  if(e.code==='Enter'&&document.getElementById('over').style.display==='flex') window.restartGame();
});

window.startGame=function(){
  document.getElementById('menu').style.display='none';
  gameRunning=true;
  buildEnvironment();
  initGame();
  requestAnimationFrame(loop);
};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// Start render loop (so menu bg looks alive)
requestAnimationFrame(loop);
</script>
</body>
</html>
